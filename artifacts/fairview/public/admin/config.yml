backend:
  name: git-gateway
  branch: main

# Enable local_backend for development (requires: npx decap-server)
local_backend: true

media_folder: "artifacts/fairview/public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "properties"
    label: "Properties"
    folder: "artifacts/fairview/src/content/properties"
    create: true
    delete: true
    slug: "{{fields.slug}}"
    format: "json"
    identifier_field: "title"
    fields:
      - label: "Slug"
        name: "slug"
        widget: "string"
        hint: "Unique URL-friendly ID, e.g. 2bed-apartment-parakin. No spaces."

      - label: "Title"
        name: "title"
        widget: "string"

      - label: "Price"
        name: "price"
        widget: "string"
        hint: "e.g. ₦350,000/year or ₦12,000,000"

      - label: "Location"
        name: "location"
        widget: "string"
        hint: "e.g. Parakin, Ile Ife"

      - label: "Size"
        name: "size"
        widget: "string"
        hint: "e.g. 120 sqm or 3 Bedrooms"

      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Apartment", value: "apartment" }
          - { label: "Shop / Commercial Space", value: "shop" }
          - { label: "Land", value: "land" }
          - { label: "House / Property", value: "property" }

      - label: "Listing Type"
        name: "listingType"
        widget: "select"
        options:
          - { label: "For Rent", value: "rent" }
          - { label: "For Lease", value: "lease" }
          - { label: "For Sale", value: "sale" }

      - label: "Main Image"
        name: "mainImage"
        widget: "image"
        hint: "Primary display image"

      - label: "Gallery"
        name: "gallery"
        widget: "list"
        hint: "Up to 3 additional images"
        field:
          label: "Image"
          name: "image"
          widget: "image"

      - label: "Video URL"
        name: "videoUrl"
        widget: "string"
        required: false
        hint: "YouTube embed URL, e.g. https://www.youtube.com/embed/XXXX"

      - label: "Description"
        name: "description"
        widget: "text"

      - label: "Features"
        name: "features"
        widget: "list"
        hint: "e.g. 3 Bedrooms, Running Water, Tiled Floors"
        field:
          label: "Feature"
          name: "feature"
          widget: "string"

      - label: "Tenant / Client Reviews"
        name: "reviews"
        widget: "list"
        required: false
        hint: "Only for rent/lease listings. Leave empty for sale listings."
        fields:
          - { label: "Reviewer Name", name: "name", widget: "string" }
          - { label: "Review Text", name: "text", widget: "text" }
          - label: "Star Rating"
            name: "rating"
            widget: "number"
            min: 1
            max: 5
            step: 1
            default: 5
